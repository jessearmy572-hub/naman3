            --text-core-white: #ffffff;
            --text-dim-slate: #8a99ad;

            --transition-tactile: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #010103;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        #image-bg {
            position: absolute; top: -12%; left: -12%;
            width: 124%; height: 124%; object-fit: cover;
            z-index: 1; pointer-events: none;
            filter: brightness(0.42) contrast(1.22) saturate(0.92);
            will-change: transform; transform: translate3d(0,0,0);
            transition: transform 0.45s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        .matrix-grid-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2;
            background-image: 
                linear-gradient(rgba(0, 255, 204, 0.015) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 204, 0.015) 1px, transparent 1px);
            background-size: 50px 50px; background-position: center center;
            pointer-events: none; opacity: 0.85;
        }

        #canvas-container {
            width: 100%; height: 100%; position: absolute; top: 0; left: 0;
            z-index: 3; cursor: grab; display: block;
            background: transparent !important; transform: translateZ(0);
        }

        #canvas-container:active { cursor: grabbing; }

        .dashboard {
            position: absolute; top: 30px; left: 30px; z-index: 10;
            background: var(--bg-glass-panel); padding: 18px 28px; border-radius: 24px;
            backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px);
            border: 1px solid var(--border-matte-white);
            box-shadow: 0 25px 55px rgba(0,0,0,0.9), inset 0 1px 3px rgba(255,255,255,0.18);
            pointer-events: auto; transform: translateZ(0); will-change: transform, opacity;
            animation: HUD_Entry_Slide_Down 0.95s cubic-bezier(0.25, 0.8, 0.25, 1) forwards;
        }

        .status-block { display: flex; align-items: center; margin-bottom: 10px; }

        .status-beacon-dot {
            display: inline-block; width: 12px; height: 12px; background: var(--neon-cyan);
            border-radius: 50%; margin-right: 16px;
            box-shadow: 0 0 15px var(--neon-cyan), 0 0 35px var(--neon-cyan);
            will-change: opacity, box-shadow; animation: HUD_Beacon_Pulse 2.5s infinite ease-in-out;
        }

        .status-title {
            font-size: 15px; font-weight: 700; text-transform: uppercase; letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(0,255,204,0.45); color: var(--text-core-white);
        }

        .channel-info { font-size: 13px; color: var(--text-dim-slate); margin-top: 6px; font-weight: 500; letter-spacing: 0.5px; }
        .channel-active-value { color: var(--neon-cyan); font-weight: 700; transition: var(--transition-tactile); }
        .drive-sync-badge { margin-top: 5px; font-size: 11px; color: #00ffcc; display: flex; align-items: center; gap: 5px; font-weight: bold; }

        .ui-dock-wrapper {
            position: absolute; bottom: 50px; width: 100%; display: flex;
            justify-content: center; align-items: center; gap: 18px; z-index: 20;
            padding: 0 40px; box-sizing: border-box; transform: translateZ(0);
            will-change: transform, opacity; animation: HUD_Dock_Slide_Up 1.05s cubic-bezier(0.25, 0.8, 0.25, 1) forwards;
        }

        .input-carrier-box {
            background: var(--bg-input-field); backdrop-filter: blur(45px); -webkit-backdrop-filter: blur(45px);
            padding: 0 35px; border-radius: 45px; flex-grow: 1; max-width: 750px; height: 70px;
            display: flex; align-items: center; border: 1px solid rgba(255, 255, 255, 0.16);
            box-shadow: 0 30px 65px rgba(0,0,0,0.9); transition: var(--transition-tactile);
            transform: translateZ(0); will-change: border-color, box-shadow, transform;
        }

        .input-carrier-box:focus-within {
            border-color: var(--neon-cyan);
            box-shadow: 0 0 35px rgba(0, 255, 204, 0.35), 0 30px 65px rgba(0,0,0,0.95);
            transform: translateY(-4px);
        }

        input {
            width: 100%; background: transparent; border: none; color: var(--text-core-white);
            outline: none; font-size: 18px; height: 100%; letter-spacing: 0.6px; font-weight: 500;
        }

        input::placeholder { color: rgba(255, 255, 255, 0.35); transition: color 0.3s ease; }
        input:focus::placeholder { color: rgba(255, 255, 255, 0.18); }

        .action-circle-btn {
            border: none; border-radius: 50%; width: 70px; height: 70px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: var(--transition-tactile); transform: translateZ(0);
            will-change: transform, box-shadow, background;
        }

        .mic-trigger-btn {
            background: linear-gradient(135deg, var(--neon-orange), var(--neon-pink));
            color: #ffffff; font-size: 26px; box-shadow: 0 12px 28px rgba(255, 75, 43, 0.42);
            border: 1px solid rgba(255,255,255,0.18);
        }

        .mic-trigger-btn:hover {
            transform: scale(1.08) translateY(-4px); box-shadow: 0 16px 40px rgba(255, 75, 43, 0.55);
        }

        .mic-trigger-btn.listening {

            box-shadow: 0 0 40px var(--neon-cyan), 0 0 20px var(--neon-blue);
            animation: UI_Active_Pulse 1.5s infinite alternate ease-in-out;

        .send-trigger-btn {
            background: #ffffff; color: #010103; font-size: 24px;
            box-shadow: 0 12px 28px rgba(255,255,255,0.18); border: 1px solid rgba(0,0,0,0.06);

        .send-trigger-btn:hover {
            transform: scale(1.08) translateY(-4px);
            box-shadow: 0 16px 40px rgba(255,255,255,0.32); background: #f4f5f7;
        }

        #subtitle-monitor-box {
            position: absolute; bottom: 155px; left: 50%; transform: translateX(-50%) translateZ(0);
            background: rgba(4, 4, 12, 0.96); padding: 18px 36px; border-radius: 26px;
            color: var(--text-core-white); font-size: 17px; max-width: 80%; width: auto;
            min-width: 260px; text-align: center; z-index: 30; backdrop-filter: blur(35px);
            -webkit-backdrop-filter: blur(35px); border: 1px solid rgba(255,255,255,0.15);
            box-shadow: 0 25px 55px rgba(0,0,0,0.95); display: none; pointer-events: none;
            line-height: 1.65; font-weight: 500; letter-spacing: 0.3px; will-change: transform, opacity;
            animation: UI_PopUp_Subtitle 0.45s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        #core-boot-loader {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(2, 2, 6, 0.90); backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px); z-index: 99999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: opacity 0.7s cubic-bezier(0.25, 1, 0.25, 1), visibility 0.7s ease;
            will-change: opacity, visibility;
        }

        .loader-ring-spinner {
            width: 76px; height: 76px; border: 4px solid rgba(0, 255, 204, 0.06);
            border-radius: 50%; border-top-color: var(--neon-cyan); border-bottom-color: var(--neon-blue);
            animation: System_Engine_Spin 1.2s linear infinite; margin-bottom: 30px;
            box-shadow: 0 0 25px rgba(0, 255, 204, 0.25);
        }

        .loader-label-text {
            color: var(--neon-cyan); font-size: 19px; letter-spacing: 2.5px;
            text-transform: uppercase; text-shadow: 0 0 15px var(--neon-matrix-glow);
            font-weight: 600; text-align: center; padding: 0 30px; line-height: 1.5;
        }

        @keyframes System_Engine_Spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes HUD_Beacon_Pulse { 0%, 100% { opacity: 0.50; box-shadow: 0 0 12px rgba(0,255,204,0.2); } 50% { opacity: 1; box-shadow: 0 0 28px var(--neon-cyan), 0 0 50px var(--neon-cyan); } }
        @keyframes UI_Active_Pulse { 0% { transform: scale(1); } 100% { transform: scale(1.08); } }
        @keyframes HUD_Entry_Slide_Down { from { opacity: 0; transform: translateY(-30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes HUD_Dock_Slide_Up { from { opacity: 0; transform: translateY(35px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes UI_PopUp_Subtitle { from { opacity: 0; transform: translateX(-50%) translateY(20px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }

        @media (max-width: 768px) {
            .dashboard { top: 20px; left: 20px; padding: 14px 22px; }
            .status-title { font-size: 13px; letter-spacing: 1.5px; }
            .channel-info { font-size: 11px; }
            .ui-dock-wrapper { bottom: 30px; padding: 0 20px; gap: 12px; }
            .input-carrier-box { height: 62px; padding: 0 24px; }

            .action-circle-btn { width: 62px; height: 62px; font-size: 21px; }

            .loader-label-text { font-size: 16px; letter-spacing: 2px; }

    </style>

        function saveParameterToMemoryStore(key, value) {
            return new Promise((resolve) => {

                const transaction = globalIndexedDBCoreReferenceInstance.transaction([MEMORY_OBJECT_STORE_NAME], "readwrite");
                const store = transaction.objectStore(MEMORY_OBJECT_STORE_NAME);
                const putOp = store.put({ profileParameterKeyIdentifier: key, storedValueDataString: value });
                putOp.onsuccess = () => resolve(true);
                putOp.onerror = () => resolve(false);
            });
        }

        function getParameterFromMemoryStore(key) {
            return new Promise((resolve) => {
                if (!globalIndexedDBCoreReferenceInstance) return resolve(null);
                const transaction = globalIndexedDBCoreReferenceInstance.transaction([MEMORY_OBJECT_STORE_NAME], "readonly");
                const store = transaction.objectStore(MEMORY_OBJECT_STORE_NAME);
                const getOp = store.get(key);
                getOp.onsuccess = () => resolve(getOp.result);
                getOp.onerror = () => resolve(null);
            });
        }
