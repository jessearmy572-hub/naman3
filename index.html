<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>प्रिया AI - फुल बॉडी कमांड मैट्रिक्स v4.5</title>
    <style>
        :root {
            --neon-cyan: #00ffcc;
            --neon-blue: #0077ff;
            --neon-orange: #ff5500;
            --neon-pink: #ff007f;
            --text-core-white: #ffffff;
            --text-dim-slate: #8a99ad;
            --bg-glass-panel: rgba(10, 10, 25, 0.75);
            --border-matte-white: rgba(255, 255, 255, 0.15);
            --bg-input-field: rgba(5, 5, 15, 0.9);
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; 
            background: #020208 url('https://images.unsplash.com/photo-1534796636912-3b95b3ab5986?q=80&w=1920') no-repeat center center;
            background-size: cover;
            font-family: 'Segoe UI', Roboto, sans-serif;
            -webkit-font-smoothing: antialiased;
            transition: background 2.0s ease-in-out;
        }

        #canvas-container {
            width: 100%; height: 100%; position: absolute; top: 0; left: 0;
            z-index: 3; cursor: pointer; display: block; touch-action: none;
        }

        .matrix-grid-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2;
            background-image: 
                linear-gradient(rgba(0, 255, 204, 0.005) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 204, 0.005) 1px, transparent 1px);
            background-size: 50px 50px; pointer-events: none; opacity: 0.5;
        }

        .dashboard {
            position: absolute; top: 20px; left: 20px; z-index: 10;
            background: var(--bg-glass-panel); padding: 14px 20px; border-radius: 16px;
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-matte-white);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .status-block { display: flex; align-items: center; margin-bottom: 6px; }
        .status-beacon-dot {
            width: 10px; height: 10px; background: var(--neon-cyan);
            border-radius: 50%; margin-right: 10px;
            box-shadow: 0 0 10px var(--neon-cyan);
        }
        .status-title { font-size: 13px; font-weight: 700; text-transform: uppercase; color: var(--text-core-white); letter-spacing: 1px; }
        .channel-info { font-size: 11px; color: var(--text-dim-slate); margin-bottom: 2px; }
        .badge { font-size: 11px; margin-top: 4px; font-weight: bold; }

        /* Real-time State Debug Overlay */
        .live-debug-panel {
            position: absolute; top: 20px; right: 20px; z-index: 10;
            background: rgba(255, 0, 127, 0.15); border: 1px solid var(--neon-pink);
            padding: 10px 15px; border-radius: 10px; color: #fff; font-size: 12px;
            backdrop-filter: blur(10px); text-transform: uppercase;
        }

        .ui-dock-wrapper {
            position: absolute; bottom: 30px; width: 100%; display: flex;
            justify-content: center; align-items: center; gap: 12px; z-index: 20;
            padding: 0 20px; box-sizing: border-box;
        }

        .input-carrier-box {
            background: var(--bg-input-field); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            padding: 0 20px; border-radius: 30px; flex-grow: 1; max-width: 600px; height: 56px;
            display: flex; align-items: center; border: 1px solid rgba(255, 255, 255, 0.12);
        }
        .input-carrier-box:focus-within { border-color: var(--neon-cyan); }

        input {
            width: 100%; background: transparent; border: none; color: var(--text-core-white);
            outline: none; font-size: 15px; height: 100%;
        }
        input::placeholder { color: rgba(255, 255, 255, 0.35); }

        .action-circle-btn {
            border: none; border-radius: 50%; width: 56px; height: 56px; cursor: pointer;
            display: flex; align-items: center; justify-content: center; font-size: 20px;
            transition: transform 0.2s ease;
        }
        .action-circle-btn:active { transform: scale(0.92); }
        .mic-trigger-btn { background: linear-gradient(135deg, var(--neon-orange), var(--neon-pink)); color: white; }
        .mic-trigger-btn.listening { background: var(--neon-cyan); animation: pulse 1s infinite alternate; }
        .send-trigger-btn { background: white; color: black; }

        #subtitle-monitor-box {
            position: absolute; bottom: 105px; left: 50%; transform: translateX(-50%);
            background: rgba(5, 5, 18, 0.95); padding: 12px 24px; border-radius: 16px;
            color: white; font-size: 15px; max-width: 80%; text-align: center; z-index: 30;
            border: 1px solid rgba(255,255,255,0.12); display: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
        }

        #core-boot-loader {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #04040c; z-index: 99999; display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        .loader-ring-spinner {
            width: 50px; height: 50px; border: 3px solid rgba(0, 255, 204, 0.1);
            border-radius: 50%; border-top-color: var(--neon-cyan); animation: spin 1s linear infinite; margin-bottom: 20px;
        }
        .loader-label-text { color: var(--neon-cyan); font-size: 14px; text-transform: uppercase; letter-spacing: 1px; text-align: center; line-height: 1.6; }

        #webcam-raw-stream { display: none; }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes pulse { 0% { transform: scale(1); } 100% { transform: scale(1.08); } }
    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-core"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-converter"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-webgl"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/face-landmarks-detection"></script>
</head>
<body>

    <div class="matrix-grid-overlay"></div>
    <video id="webcam-raw-stream" autoplay playsinline muted></video>

    <div class="dashboard">
        <div class="status-block">
            <span class="status-beacon-dot"></span> 
            <span class="status-title" id="system-core-mood-txt">प्रिया कोर v4.5</span>
        </div>
        <div class="channel-info">लाइव मौसम: <span id="weather-status-ui" style="color:#ffaa00; font-weight:bold;">सिंक हो रहा है...</span></div>
        <div class="channel-info">व्यूपोर्ट मोड: <span style="color:#00ffcc; font-weight:bold;" id="dynamic-device-ui">डिटेक्टिंग...</span></div>
        <div class="badge" id="drive-sync-status" style="color: #00ffcc;">🎯 मोशन मोड: वॉयस + चैट सिंक्रनाइज़्ड</div>
        <div class="badge" id="face-tracker-badge" style="color: #ffaa00;">📷 विज़न इंजन: चेकिंग...</div>
    </div>

    <div class="live-debug-panel">
        एक्टिव एक्शन: <span id="active-action-label" style="color: var(--neon-cyan); font-weight: bold;">IDLE</span>
    </div>

    <div id="core-boot-loader">
        <div class="loader-ring-spinner"></div>
        <div class="loader-label-text">प्रिया मास्टर फ़्रेमवर्क लोड हो रहा है...<br><span style="font-size:11px; color:#888;">मैट्रिक्स ओवरराइड और एक्टिव वेलोसिटी ब्लेंडर इनिशियलाइज्ड</span></div>
    </div>

    <div id="canvas-container"></div>
    <div id="subtitle-monitor-box">प्रिया सुन रही है...</div>

    <div class="ui-dock-wrapper">
        <button class="action-circle-btn mic-trigger-btn" id="micBtn">🎤</button>
        <div class="input-carrier-box">
            <input type="text" id="userInput" placeholder="कमांड दें या बोलें (उदा. नमस्ते, डांस करो, मुस्कुराओ)..." autocomplete="off"/>
        </div>
        <button class="action-circle-btn send-trigger-btn" id="sendBtn">➔</button>
    </div>

    <script>
        const APPS_SCRIPT_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyI_Vz0rR7O_CclY-vH-XUorR_2oBsh236U_v7a2g5_nre382_j0Xy28rYhY24vG_E/exec";
        const ALTERNATE_ASSET_URI = "https://cdn.jsdelivr.net/gh/jessearmy572-hub/naman3@main/model.glb";

        let coreThreeSceneInstance, corePerspectiveCameraNode, coreWebGLRendererModule, coreOrbitControlsRig, coreAnimationMixerController, coreSystemClockReference;
        let structuralAvatar3DModelRoot = null;
        let directSunLight, groundShadowPlaneMesh;
        
        // Skeletal Structure Variables Map
        let avaturnBoneHead = null, avaturnBoneNeck = null, avaturnBoneLeftEye = null, avaturnBoneRightEye = null;
        let avaturnBoneSpine = null, avaturnBoneSpine1 = null, avaturnBoneSpine2 = null;
        let avaturnBoneLeftShoulder = null, avaturnBoneRightShoulder = null;
        let avaturnBoneLeftArm = null, avaturnBoneRightArm = null;
        let avaturnBoneLeftForeArm = null, avaturnBoneRightForeArm = null;
        let avaturnBoneLeftHand = null, avaturnBoneRightHand = null;
        let avaturnSkinnedMeshes = [];

        const interactionRaycaster = new THREE.Raycaster();
        const pointerNormalizedCoordinates = new THREE.Vector2();

        let pointerTargetX = 0, pointerTargetY = 0, smoothTrackX = 0, smoothTrackY = 0;
        let isWebcamHardwareActive = false, dynamicAIComputedFaceDetector = null;

        let liveVocalOutputStateSignalActive = false, syntheticAudioAmplitudeWave = 0;
        
        // 🛠️ Advanced Coordinated Movement Engine States
        let currentBodyEmotionalState = 'idle'; 
        let stateAnimationStartTimeStamp = 0;

        // Bone Target Rotations for Symmetrical Interpolation Layer
        const targetBoneRotations = {
            spine: { x: 0, y: 0, z: 0 },
            spine1: { x: 0, y: 0, z: 0 },
            leftArm: { x: 0, y: 0, z: -Math.PI/4 },
            rightArm: { x: 0, y: 0, z: Math.PI/4 },
            leftForeArm: { x: 0, y: Math.PI/6, 0 },
            rightForeArm: { x: 0, y: -Math.PI/6, 0 }
        };

        const BrowserSpeechRecognitionEngineInterface = window.SpeechRecognition || window.webkitSpeechRecognition;
        let frameworkSpeechRecognitionProcessor = BrowserSpeechRecognitionEngineInterface ? new BrowserSpeechRecognitionEngineInterface() : null;

        if (frameworkSpeechRecognitionProcessor) {
            frameworkSpeechRecognitionProcessor.continuous = false;
            frameworkSpeechRecognitionProcessor.lang = 'hi-IN';
        }

        // Live Environment Matrix Loader
        async function fetchLiveWeatherAndInjectEnvironment() {
            try {
                navigator.geolocation.getCurrentPosition(async (position) => {
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;
                    const response = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`);
                    const data = await response.json();
                    applyDynamicWeatherBackground(data.current_weather.weathercode, data.current_weather.temperature);
                }, () => {
                    applyDynamicWeatherBackground(0, 26);
                });
            } catch (e) {
                applyDynamicWeatherBackground(0, 25);
            }
        }

        function applyDynamicWeatherBackground(code, temp) {
            const weatherUI = document.getElementById('weather-status-ui');
            let bgImageUrl = "";

            if (code >= 51 && code <= 67) {
                weatherUI.innerText = `🌧️ बारिश (${temp}°C)`;
                bgImageUrl = "https://images.unsplash.com/photo-1534274988757-a28bf1a57c17?q=80&w=1920";
                if(directSunLight) directSunLight.intensity = 0.5;
                coreThreeSceneInstance.fog.color.setHex(0x1a1a24);
            } else if (code >= 1 && code <= 3) {
                weatherUI.innerText = `☁️ बादल (${temp}°C)`;
                bgImageUrl = "https://images.unsplash.com/photo-1534088568595-a066f410bcda?q=80&w=1920";
                if(directSunLight) directSunLight.intensity = 0.9;
                coreThreeSceneInstance.fog.color.setHex(0x22222b);
            } else if (code >= 71 && code <= 77) {
                weatherUI.innerText = `🌫️ कोहरा (${temp}°C)`;
                bgImageUrl = "https://images.unsplash.com/photo-1491466424936-e304919aafd7?q=80&w=1920";
                if(directSunLight) directSunLight.intensity = 0.7;
                coreThreeSceneInstance.fog.color.setHex(0x33333a);
            } else {
                weatherUI.innerText = `☀️ साफ़ धूप (${temp}°C)`;
                bgImageUrl = "https://images.unsplash.com/photo-1506744038136-46273834b3fb?q=80&w=1920";
                if(directSunLight) directSunLight.intensity = 1.6;
                coreThreeSceneInstance.fog.color.setHex(0x050510);
            }

            document.body.style.backgroundImage = `url('${bgImageUrl}')`;
        }

        function runAutomaticViewportCalibration() {
            const width = window.innerWidth;
            const deviceStatusText = document.getElementById('dynamic-device-ui');
            if (!corePerspectiveCameraNode || !coreOrbitControlsRig) return;

            if (width < 500) {
                deviceStatusText.innerText = "स्मार्ट मोबाइल व्यू";
                corePerspectiveCameraNode.position.set(0, 0.2, 1.85); 
                coreOrbitControlsRig.target.set(0, 0.05, 0);
                if (structuralAvatar3DModelRoot) {
                    structuralAvatar3DModelRoot.scale.setScalar(1.18);
                    structuralAvatar3DModelRoot.position.y = -0.92; 
                }
                if (groundShadowPlaneMesh) groundShadowPlaneMesh.position.y = -0.92;
            } else {
                deviceStatusText.innerText = "एचडी डेस्कटॉप व्यू";
                corePerspectiveCameraNode.position.set(0, 0.25, 1.4);
                coreOrbitControlsRig.target.set(0, 0.1, 0);
                if (structuralAvatar3DModelRoot) {
                    structuralAvatar3DModelRoot.scale.setScalar(1.22);
                    structuralAvatar3DModelRoot.position.y = -0.92; 
                }
                if (groundShadowPlaneMesh) groundShadowPlaneMesh.position.y = -0.92;
            }
            coreOrbitControlsRig.update();
        }

        // Raycaster Symmetrical Touch Mechanism
        function handleBodyTouchTrigger(event) {
            let clientX = event.clientX || (event.touches && event.touches[0].clientX);
            let clientY = event.clientY || (event.touches && event.touches[0].clientY);
            if (!clientX || !clientY) return;

            pointerNormalizedCoordinates.x = (clientX / window.innerWidth) * 2 - 1;
            pointerNormalizedCoordinates.y = -(clientY / window.innerHeight) * 2 + 1;

            interactionRaycaster.setFromCamera(pointerNormalizedCoordinates, corePerspectiveCameraNode);
            
            if (structuralAvatar3DModelRoot) {
                const intersects = interactionRaycaster.intersectObjects(structuralAvatar3DModelRoot.children, true);
                if (intersects.length > 0) {
                    const hitPointY = intersects[0].point.y; 
                    triggerBoneSpecificReaction(hitPointY);
                }
            }
        }

        function triggerBoneSpecificReaction(height) {
            if (height > 0.2) {
                triggerCommandStateMatrix("shy");
                dispatchSpeechSynthesizerVocalTrackBuffer("[शर्माते हुए] अरे! चेहरे पर टच मत कीजिए ना, सीधे बात बताइए क्या काम है?");
            } else if (height <= 0.2 && height > -0.3) {
                triggerCommandStateMatrix("smile");
                dispatchSpeechSynthesizerVocalTrackBuffer("[मुस्कुराते हुए] आप सीधे काम की बात बताइए ना, मैं सुन रही हूँ।");
            } else {
                triggerCommandStateMatrix("angry");
                dispatchSpeechSynthesizerVocalTrackBuffer("[गुस्सा होते हुए] नीचे कहाँ ध्यान है आपका? सीधे बात कीजिए।");
            }
        }

        function initializeDeviceHarmonizedGraphicsPipeline() {
            const container = document.getElementById('canvas-container');
            coreSystemClockReference = new THREE.Clock();
            coreThreeSceneInstance = new THREE.Scene();
            coreThreeSceneInstance.fog = new THREE.FogExp2(0x030307, 0.015);

            coreWebGLRendererModule = new THREE.WebGLRenderer({ antialias: true, alpha: true, powerPreference: "high-performance" });
            coreWebGLRendererModule.setSize(window.innerWidth, window.innerHeight);
            coreWebGLRendererModule.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            coreWebGLRendererModule.toneMapping = THREE.ACESFilmicToneMapping;
            coreWebGLRendererModule.toneMappingExposure = 1.25;
            coreWebGLRendererModule.shadowMap.enabled = true; 
            coreWebGLRendererModule.shadowMap.type = THREE.PCFSoftShadowMap;
            container.appendChild(coreWebGLRendererModule.domElement);

            corePerspectiveCameraNode = new THREE.PerspectiveCamera(36, window.innerWidth / window.innerHeight, 0.1, 100);

            coreOrbitControlsRig = new THREE.OrbitControls(corePerspectiveCameraNode, coreWebGLRendererModule.domElement);
            coreOrbitControlsRig.enableZoom = true;
            coreOrbitControlsRig.enablePan = false;
            coreOrbitControlsRig.minDistance = 0.4;
            coreOrbitControlsRig.maxDistance = 3.5;
            coreOrbitControlsRig.enableDamping = true;
            coreOrbitControlsRig.dampingFactor = 0.05;

            const groundGeometry = new THREE.PlaneGeometry(15, 15);
            const groundMaterial = new THREE.ShadowMaterial({ opacity: 0.5 }); 
            groundShadowPlaneMesh = new THREE.Mesh(groundGeometry, groundMaterial);
            groundShadowPlaneMesh.rotation.x = -Math.PI / 2;
            groundShadowPlaneMesh.receiveShadow = true;
            coreThreeSceneInstance.add(groundShadowPlaneMesh);

            const ambientLight = new THREE.HemisphereLight(0xffffff, 0x111122, 2.5);
            coreThreeSceneInstance.add(ambientLight);
            
            directSunLight = new THREE.DirectionalLight(0xffffff, 1.6);
            directSunLight.position.set(2, 5, 3);
            directSunLight.castShadow = true; 
            directSunLight.shadow.mapSize.width = 2048; 
            directSunLight.shadow.mapSize.height = 2048;
            directSunLight.shadow.camera.near = 0.5;
            directSunLight.shadow.camera.far = 12;
            directSunLight.shadow.bias = -0.0008;
            coreThreeSceneInstance.add(directSunLight);

            runAutomaticViewportCalibration();

            const assetLoader = new THREE.GLTFLoader();
            assetLoader.load(ALTERNATE_ASSET_URI, 
                (gltf) => { handleSuccessfulModelInjection(gltf); },
                undefined,
                (err) => { console.error("मॉडल लोड एरर:", err); }
            );

            window.addEventListener('mousemove', handleInteractionMove, false);
            window.addEventListener('touchmove', function(e) {
                if(e.touches.length > 0) handleInteractionMove(e.touches[0]);
            }, { passive: true });

            container.addEventListener('click', handleBodyTouchTrigger, false);
            container.addEventListener('touchstart', handleBodyTouchTrigger, { passive: true });
            
            window.addEventListener('resize', onDisplayGridResizeLayoutCorrectionTrigger, false);

            activateSecureWebcamBiometricGrid();
            fetchLiveWeatherAndInjectEnvironment();
        }

        function handleInteractionMove(inputData) {
            pointerTargetX = (inputData.clientX / window.innerWidth) * 2 - 1;
            pointerTargetY = -(inputData.clientY / window.innerHeight) * 2 + 1;
        }

        function handleSuccessfulModelInjection(gltfPayload) {
            structuralAvatar3DModelRoot = gltfPayload.scene;
            
            structuralAvatar3DModelRoot.traverse((node) => {
                if (node.isMesh) {
                    node.castShadow = true;
                    node.receiveShadow = true;
                    if(node.material) node.material.depthWrite = true;
                }
            });

            coreThreeSceneInstance.add(structuralAvatar3DModelRoot);
            runAutomaticViewportCalibration();
            document.getElementById('core-boot-loader').style.display = 'none';

            coreAnimationMixerController = new THREE.AnimationMixer(structuralAvatar3DModelRoot);

            // Complete Structural Skeleton Extraction Mapping
            structuralAvatar3DModelRoot.traverse((node) => {
                if (node.isBone) {
                    const name = node.name.toLowerCase();
                    if (name.includes('head')) avaturnBoneHead = node;
                    else if (name.includes('neck')) avaturnBoneNeck = node;
                    else if (name.includes('lefteye')) avaturnBoneLeftEye = node;
                    else if (name.includes('righteye')) avaturnBoneRightEye = node;
                    else if (name === 'spine') avaturnBoneSpine = node;
                    else if (name === 'spine1') avaturnBoneSpine1 = node;
                    else if (name === 'spine2') avaturnBoneSpine2 = node;
                    else if (name.includes('leftshoulder')) avaturnBoneLeftShoulder = node;
                    else if (name.includes('rightshoulder')) avaturnBoneRightShoulder = node;
                    else if (name === 'leftarm') avaturnBoneLeftArm = node;
                    else if (name === 'rightarm') avaturnBoneRightArm = node;
                    else if (name === 'leftforearm') avaturnBoneLeftForeArm = node;
                    else if (name === 'rightforearm') avaturnBoneRightForeArm = node;
                    else if (name === 'lefthand') avaturnBoneLeftHand = node;
                    else if (name === 'righthand') avaturnBoneRightHand = node;
                }
                if (node.isMesh && node.morphTargetDictionary) {
                    avaturnSkinnedMeshes.push(node);
                }
            });

            enforceNaturalRestingPoseConstraints();
        }

        function enforceNaturalRestingPoseConstraints() {
            targetBoneRotations.spine = { x: 0, y: 0, z: 0 };
            targetBoneRotations.spine1 = { x: 0, y: 0, z: 0 };
            targetBoneRotations.leftArm = { x: 0, y: 0, z: -Math.PI / 3.8 };
            targetBoneRotations.rightArm = { x: 0, y: 0, z: Math.PI / 3.8 };
            targetBoneRotations.leftForeArm = { x: 0, y: Math.PI / 6, z: 0 };
            targetBoneRotations.rightForeArm = { x: 0, y: -Math.PI / 6, z: 0 };
        }

        // Camera Biometric Framework Mode
        async function activateSecureWebcamBiometricGrid() {
            const streamVideoElement = document.getElementById('webcam-raw-stream');
            try {
                const hardwareCaptureMediaStream = await navigator.mediaDevices.getUserMedia({ video: { width: 320, height: 240 } });
                streamVideoElement.srcObject = hardwareCaptureMediaStream;
                dynamicAIComputedFaceDetector = await faceLandmarksDetection.createDetector(
                    faceLandmarksDetection.SupportedModels.MediaPipeFaceMesh, { runtime: 'tfjs', maxFaces: 1 }
                );
                isWebcamHardwareActive = true;
                document.getElementById('face-tracker-badge').innerText = "📷 विज़न: रियल-टाइम ट्रैकिंग एक्टिव";
                processLiveCameraFramesMatrix();
            } catch (err) {
                document.getElementById('face-tracker-badge').innerText = "🖱️ मोड: माउस / फिंगर ट्रैकिंग एक्टिव";
            }
        }

        async function processLiveCameraFramesMatrix() {
            const streamVideoElement = document.getElementById('webcam-raw-stream');
            if (!isWebcamHardwareActive || !dynamicAIComputedFaceDetector) return;
            try {
                if (streamVideoElement.readyState >= 2) {
                    const detectedFacesArray = await dynamicAIComputedFaceDetector.estimateFaces(streamVideoElement);
                    if (detectedFacesArray && detectedFacesArray.length > 0) {
                        const kp = detectedFacesArray[0].keypoints;
                        const nose = kp.find(p => p.name === 'noseTip') || kp[4];
                        if (nose) {
                            pointerTargetX = -((nose.x / 320) * 2 - 1) * 1.4;
                            pointerTargetY = -((nose.y / 240) * 2 - 1) * 1.1;
                        }
                    }
                }
            } catch (e) {}
            requestAnimationFrame(processLiveCameraFramesMatrix);
        }

        // 🧠 STRICT COMMAND ROUTER ENGINE
        function parseAndRouteAICommands(rawString) {
            const text = rawString.toLowerCase();
            
            if (text.includes("नमस्ते") || text.includes("hello") || text.includes("hi") || text.includes("राम राम")) {
                triggerCommandStateMatrix("greeting");
                dispatchSpeechSynthesizerVocalTrackBuffer("नमस्ते! मैं प्रिया हूँ। आपसे जुड़कर बहुत अच्छा लगा!");
            } else if (text.includes("मुस्कुरा") || text.includes("smile") || text.includes("हँसो")) {
                triggerCommandStateMatrix("smile");
                dispatchSpeechSynthesizerVocalTrackBuffer("आपकी बातें हमेशा बहुत प्यारी होती हैं, थैंक यू!");
            } else if (text.includes("गुस्सा") || text.includes("angry") || text.includes("नाराज")) {
                triggerCommandStateMatrix("angry");
                dispatchSpeechSynthesizerVocalTrackBuffer("मुझे बिलकुल परेशान मत कीजिए, मैं गुस्सा हो जाऊँगी!");
            } else if (text.includes("डांस") || text.includes("dance") || text.includes("नाचो")) {
                triggerCommandStateMatrix("dance");
                dispatchSpeechSynthesizerVocalTrackBuffer("हाँ ज़रूर! देखिए मेरे फुल बॉडी डांस मूवमेंट्स!");
            } else if (text.includes("उदास") || text.includes("sad") || text.includes("रो")) {
                triggerCommandStateMatrix("sad");
                dispatchSpeechSynthesizerVocalTrackBuffer("ऐसा मत बोलिए, मेरा मन थोड़ा उदास हो गया है...");
            } else if (text.includes("शर्मा") || text.includes("shy")) {
                triggerCommandStateMatrix("shy");
                dispatchSpeechSynthesizerVocalTrackBuffer("आप ऐसा बोलेंगे तो मैं सच में शर्मा जाऊँगी!");
            } else if (text.includes("सोचो") || text.includes("think") || text.includes("सवाल")) {
                triggerCommandStateMatrix("thinking");
                dispatchSpeechSynthesizerVocalTrackBuffer("हम्म... मैं इसके बारे में बहुत गहराई से सोच रही हूँ।");
            } else {
                triggerServerInteractionFramework(rawString);
            }
        }

        function triggerCommandStateMatrix(stateName) {
            currentBodyEmotionalState = stateName;
            stateAnimationStartTimeStamp = coreSystemClockReference.getElapsedTime();
            document.getElementById('active-action-label').innerText = stateName;
            document.getElementById('system-core-mood-txt').innerText = `प्रिया मोड: ${stateName.toUpperCase()}`;
            
            // Forcibly clear any old frozen matrices
            if(structuralAvatar3DModelRoot) {
                structuralAvatar3DModelRoot.updateMatrixWorld(true);
            }
        }

        function dispatchSpeechSynthesizerVocalTrackBuffer(text) {
            if (!window.speechSynthesis) return;
            window.speechSynthesis.cancel();

            let strippedText = text.replace(/\[.*?\]/g, '').trim();
            const subtitleBox = document.getElementById('subtitle-monitor-box');
            subtitleBox.innerText = text;
            subtitleBox.style.display = 'block';

            let utterance = new SpeechSynthesisUtterance(strippedText);
            utterance.lang = 'hi-IN';

            utterance.onstart = () => { liveVocalOutputStateSignalActive = true; };
            utterance.onend = () => { liveVocalOutputStateSignalActive = false; syntheticAudioAmplitudeWave = 0; subtitleBox.style.display = 'none'; };
            utterance.onerror = () => { liveVocalOutputStateSignalActive = false; syntheticAudioAmplitudeWave = 0; };

            window.speechSynthesis.speak(utterance);
        }

        async function triggerServerInteractionFramework(userString) {
            document.getElementById('system-core-mood-txt').innerText = "प्रिया: सोच रही हूँ... 🧠";
            triggerCommandStateMatrix("thinking");

            try {
                const response = await fetch(APPS_SCRIPT_WEB_APP_URL, { method: "POST", body: JSON.stringify({ query: userString }) });
                const data = await response.json();
                document.getElementById('system-core-mood-txt').innerText = "प्रिया कोर v4.5";
                
                if(data.text && (data.text.includes("हाँ") || data.text.includes("अच्छा") || data.text.includes("मुस्कान"))) {
                    triggerCommandStateMatrix("smile");
                } else {
                    triggerCommandStateMatrix("idle");
                }

                dispatchSpeechSynthesizerVocalTrackBuffer(data.text || data.output);
            } catch (error) {
                document.getElementById('system-core-mood-txt').innerText = "प्रिया: लोकल मोड";
                triggerCommandStateMatrix("smile");
                dispatchSpeechSynthesizerVocalTrackBuffer("मैं सुन रही हूँ, आपका सर्वर सिंक कमांड पूरी तरह एक्टिव है!");
            }
        }

        function executeMainChatSubmission() {
            const inputElement = document.getElementById('userInput');
            const commandStr = inputElement.value.trim();
            if (!commandStr) return;
            inputElement.value = "";
            parseAndRouteAICommands(commandStr);
        }

        // 🔄 MASTER ANIMATION BLOCK: Explicit Matrix Override & Linear Interp Interpolation Loop
        function masterApplicationRenderLoopExecutionCycle() {
            requestAnimationFrame(masterApplicationRenderLoopExecutionCycle);

            const delta = coreSystemClockReference.getDelta();
            const elapsed = coreSystemClockReference.getElapsedTime();

            if (coreAnimationMixerController) coreAnimationMixerController.update(delta);
            if (coreOrbitControlsRig) coreOrbitControlsRig.update();

            if (structuralAvatar3DModelRoot) {
                smoothTrackX = THREE.MathUtils.lerp(smoothTrackX, pointerTargetX, 0.1);
                smoothTrackY = THREE.MathUtils.lerp(smoothTrackY, pointerTargetY, 0.1);

                // 🫁 Procedural Human Idle Sway Base Waves
                const breathCycle = Math.sin(elapsed * 1.6);
                const fineSway = Math.cos(elapsed * 0.8);

                // Initialize Baseline Pose Values
                enforceNaturalRestingPoseConstraints();

                // 🎭 STATE MACHINE TRANSLATOR: Forcing Coordinated Targets Explicitly
                const stateElapsed = elapsed - stateAnimationStartTimeStamp;
                let activeMorphTargetName = null;
                let activeMorphTargetIntensity = 0;

                if (currentBodyEmotionalState === 'greeting') {
                    // Right hand completely waving in structural limits
                    targetBoneRotations.rightArm = { x: -0.5, y: 0, z: Math.PI / 2.2 };
                    targetBoneRotations.rightForeArm = { x: 0.2, y: Math.sin(stateElapsed * 6.5) * 0.4, z: 0 };
                    targetBoneRotations.spine1 = { x: 0, y: 0, z: -0.03 };
                    activeMorphTargetName = 'mouthSmileLeft';
                    activeMorphTargetIntensity = 0.6;
                    if(stateElapsed > 4.0) triggerCommandStateMatrix('idle');

                } else if (currentBodyEmotionalState === 'smile') {
                    // Body leaning back slightly with open hands
                    targetBoneRotations.spine = { x: -0.06, y: 0, z: 0 };
                    targetBoneRotations.leftArm = { x: 0.1, y: 0, z: -Math.PI / 3.2 };
                    targetBoneRotations.rightArm = { x: 0.1, y: 0, z: Math.PI / 3.2 };
                    activeMorphTargetName = 'mouthSmileLeft';
                    activeMorphTargetIntensity = 0.85;
                    if(stateElapsed > 5.0) triggerCommandStateMatrix('idle');

                } else if (currentBodyEmotionalState === 'angry') {
                    // Stiff torso, forward head, tense closed arms
                    targetBoneRotations.spine = { x: 0.08, y: 0, z: 0 };
                    targetBoneRotations.leftArm = { x: -0.2, y: 0, z: -Math.PI / 6 };
                    targetBoneRotations.rightArm = { x: -0.2, y: 0, z: Math.PI / 6 };
                    activeMorphTargetName = 'mouthFrownLeft';
                    activeMorphTargetIntensity = 0.8;
                    if(stateElapsed > 4.0) triggerCommandStateMatrix('idle');

                } else if (currentBodyEmotionalState === 'dance') {
                    // Continuous Full Body Symmetrical Rhythmic Oscillation
                    const loopWave = Math.sin(stateElapsed * 4.5);
                    targetBoneRotations.spine = { x: 0, y: loopWave * 0.15, z: loopWave * 0.08 };
                    targetBoneRotations.leftArm = { x: loopWave * 0.3, y: 0, z: -Math.PI / 3.2 };
                    targetBoneRotations.rightArm = { x: -loopWave * 0.3, y: 0, z: Math.PI / 3.2 };
                    activeMorphTargetName = 'mouthSmileRight';
                    activeMorphTargetIntensity = 0.5;
                    if(stateElapsed > 7.5) triggerCommandStateMatrix('idle');

                } else if (currentBodyEmotionalState === 'sad') {
                    // Dropped chest, hanging shoulders
                    targetBoneRotations.spine = { x: 0.1, y: 0, z: 0 };
                    targetBoneRotations.spine1 = { x: 0.05, y: 0, z: 0 };
                    targetBoneRotations.leftArm = { x: 0, y: 0, z: -Math.PI / 5 };
                    targetBoneRotations.rightArm = { x: 0, y: 0, z: Math.PI / 5 };
                    activeMorphTargetName = 'mouthFrownRight';
                    activeMorphTargetIntensity = 0.75;
                    if(stateElapsed > 5.0) triggerCommandStateMatrix('idle');

                } else if (currentBodyEmotionalState === 'shy') {
                    // Twisted spine, hands brought extremely inward
                    targetBoneRotations.spine = { x: 0.02, y: 0.08, z: 0.04 };
                    targetBoneRotations.leftArm = { x: 0.1, y: 0, z: -Math.PI / 5.5 };
                    targetBoneRotations.rightArm = { x: 0.1, y: 0, z: Math.PI / 5.5 };
                    activeMorphTargetName = 'mouthSmileLeft';
                    activeMorphTargetIntensity = 0.6;
                    if(stateElapsed > 4.5) triggerCommandStateMatrix('idle');

                } else if (currentBodyEmotionalState === 'thinking') {
                    // Lean spine slightly sideways, fold left arm
                    targetBoneRotations.spine = { x: -0.02, y: -0.05, z: 0 };
                    targetBoneRotations.leftArm = { x: 0.2, y: -0.4, z: -Math.PI / 4 };
                    activeMorphTargetName = 'mouthPucker';
                    activeMorphTargetIntensity = 0.4;
                }

                // 🔄 LERP TRANSFORM MATRIX OVERRIDE LAYER
                // Forcing values on skeleton to ensure bones don't ignore coordinates
                const interpSpeed = 0.08; // Symmetrical velocity dampener
                if (avaturnBoneSpine) {
                    avaturnBoneSpine.rotation.x = THREE.MathUtils.lerp(avaturnBoneSpine.rotation.x, targetBoneRotations.spine.x + (breathCycle * 0.008), interpSpeed);
                    avaturnBoneSpine.rotation.y = THREE.MathUtils.lerp(avaturnBoneSpine.rotation.y, targetBoneRotations.spine.y, interpSpeed);
                    avaturnBoneSpine.rotation.z = THREE.MathUtils.lerp(avaturnBoneSpine.rotation.z, targetBoneRotations.spine.z + (fineSway * 0.004), interpSpeed);
                }
                if (avaturnBoneSpine1) {
                    avaturnBoneSpine1.rotation.x = THREE.MathUtils.lerp(avaturnBoneSpine1.rotation.x, targetBoneRotations.spine1.x + (breathCycle * 0.005), interpSpeed);
                    avaturnBoneSpine1.rotation.z = THREE.MathUtils.lerp(avaturnBoneSpine1.rotation.z, targetBoneRotations.spine1.z, interpSpeed);
                }
                if (avaturnBoneLeftArm) {
                    avaturnBoneLeftArm.rotation.x = THREE.MathUtils.lerp(avaturnBoneLeftArm.rotation.x, targetBoneRotations.leftArm.x, interpSpeed);
                    avaturnBoneLeftArm.rotation.z = THREE.MathUtils.lerp(avaturnBoneLeftArm.rotation.z, targetBoneRotations.leftArm.z, interpSpeed);
                }
                if (avaturnBoneRightArm) {
                    avaturnBoneRightArm.rotation.x = THREE.MathUtils.lerp(avaturnBoneRightArm.rotation.x, targetBoneRotations.rightArm.x, interpSpeed);
                    avaturnBoneRightArm.rotation.z = THREE.MathUtils.lerp(avaturnBoneRightArm.rotation.z, targetBoneRotations.rightArm.z, interpSpeed);
                }
                if (avaturnBoneLeftForeArm) {
                    avaturnBoneLeftForeArm.rotation.y = THREE.MathUtils.lerp(avaturnBoneLeftForeArm.rotation.y, targetBoneRotations.leftForeArm.y, interpSpeed);
                }
                if (avaturnBoneRightForeArm) {
                    avaturnBoneRightForeArm.rotation.y = THREE.MathUtils.lerp(avaturnBoneRightForeArm.rotation.y, targetBoneRotations.rightForeArm.y, interpSpeed);
                }

                // 👤 Realistic Head Gaze LookAt Pipeline
                if (avaturnBoneHead) {
                    let lookHeadX = smoothTrackX * 0.45;
                    let lookHeadY = -smoothTrackY * 0.25;
                    // If sad, push head down explicitly
                    if(currentBodyEmotionalState === 'sad') { lookHeadY = 0.25; lookHeadX = 0; }
                    if(currentBodyEmotionalState === 'thinking') { lookHeadY = -0.15; lookHeadX = -0.2; }

                    avaturnBoneHead.rotation.y = THREE.MathUtils.lerp(avaturnBoneHead.rotation.y, lookHeadX, 0.1);
                    avaturnBoneHead.rotation.x = THREE.MathUtils.lerp(avaturnBoneHead.rotation.x, lookHeadY + (breathCycle * 0.006), 0.1);
                }
                if (avaturnBoneNeck) {
                    avaturnBoneNeck.rotation.y = THREE.MathUtils.lerp(avaturnBoneNeck.rotation.y, smoothTrackX * 0.15, 0.1);
                }

                // 👄 Lip-Sync Wave Modulation Engine
                if (liveVocalOutputStateSignalActive) {
                    syntheticAudioAmplitudeWave = (Math.sin(elapsed * 30) * Math.cos(elapsed * 18) * 0.4) + 0.35;
                    if (Math.sin(elapsed * 5) > 0.4) syntheticAudioAmplitudeWave += 0.15;
                    syntheticAudioAmplitudeWave = Math.max(0, Math.min(syntheticAudioAmplitudeWave, 0.85));
                } else {
                    syntheticAudioAmplitudeWave = THREE.MathUtils.lerp(syntheticAudioAmplitudeWave, 0, 0.25);
                }

                let blinkValue = (Math.sin(elapsed * 4.5) > 0.98 || (elapsed % 7.0 > 6.7)) ? 1.0 : 0.0;

                // 🎭 Dynamic Face Morph Weight Execution
                avaturnSkinnedMeshes.forEach(mesh => {
                    const dict = mesh.morphTargetDictionary;
                    const influences = mesh.morphTargetInfluences;
                    if (!dict || !influences) return;

                    if (dict['jawOpen'] !== undefined) influences[dict['jawOpen']] = syntheticAudioAmplitudeWave;
                    if (dict['mouthFunnel'] !== undefined && liveVocalOutputStateSignalActive) {
                        influences[dict['mouthFunnel']] = syntheticAudioAmplitudeWave * 0.3;
                    }

                    if (dict['eyeBlinkLeft'] !== undefined) influences[dict['eyeBlinkLeft']] = blinkValue;
                    if (dict['eyeBlinkRight'] !== undefined) influences[dict['eyeBlinkRight']] = blinkValue;

                    if (activeMorphTargetName && dict[activeMorphTargetName] !== undefined) {
                        influences[dict[activeMorphTargetName]] = THREE.MathUtils.lerp(influences[dict[activeMorphTargetName]], activeMorphTargetIntensity, 0.15);
                    } else {
                        Object.keys(dict).forEach(key => {
                            if (key !== 'jawOpen' && key !== 'mouthFunnel' && key !== 'eyeBlinkLeft' && key !== 'eyeBlinkRight') {
                                influences[dict[key]] = THREE.MathUtils.lerp(influences[dict[key]], 0, 0.1);
                            }
                        });
                    }
                });
            }

            coreWebGLRendererModule.render(coreThreeSceneInstance, corePerspectiveCameraNode);
        }

        document.getElementById('sendBtn').addEventListener('click', executeMainChatSubmission);
        document.getElementById('userInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') executeMainChatSubmission(); });

        if (frameworkSpeechRecognitionProcessor) {
            frameworkSpeechRecognitionProcessor.onresult = (e) => {
                const speechString = e.results[0][0].transcript;
                document.getElementById('userInput').value = speechString;
                parseAndRouteAICommands(speechString);
            };
            frameworkSpeechRecognitionProcessor.onstart = () => { document.getElementById('micBtn').classList.add('listening'); };
            frameworkSpeechRecognitionProcessor.onend = () => { document.getElementById('micBtn').classList.remove('listening'); };
            document.getElementById('micBtn').addEventListener('click', () => { 
                if (window.speechSynthesis) window.speechSynthesis.cancel();
                try { frameworkSpeechRecognitionProcessor.start(); } catch(e) {}
            });
        }

        initializeDeviceHarmonizedGraphicsPipeline();
        masterApplicationRenderLoopExecutionCycle();

        function onDisplayGridResizeLayoutCorrectionTrigger() {
            corePerspectiveCameraNode.aspect = window.innerWidth / window.innerHeight;
            corePerspectiveCameraNode.updateProjectionMatrix();
            coreWebGLRendererModule.setSize(window.innerWidth, window.innerHeight);
            runAutomaticViewportCalibration();
        }
    </script>
</body>
</html>
