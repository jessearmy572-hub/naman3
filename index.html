<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Priya AI - Advanced 3D Companion</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        #video-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            z-index: 0;
            pointer-events: none;
        }
        #webcam-video {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 120px;
            height: 90px;
            border-radius: 10px;
            border: 2px solid rgba(255,255,255,0.5);
            z-index: 10;
            transform: scaleX(-1);
            display: none;
        }
        #ui-container {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 5;
            width: 90%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        #subtitles {
            background: rgba(0, 0, 0, 0.65);
            color: #fff;
            padding: 12px 20px;
            border-radius: 15px;
            text-align: center;
            font-size: 18px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.1);
            min-height: 24px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        .controls-row {
            display: flex;
            gap: 10px;
        }
        input[type="text"] {
            flex: 1;
            padding: 15px;
            border-radius: 30px;
            border: none;
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
            font-size: 16px;
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            outline: none;
            transition: all 0.3s;
        }
        input[type="text"]::placeholder {
            color: rgba(255,255,255,0.7);
        }
        input[type="text"]:focus {
            background: rgba(255, 255, 255, 0.3);
            box-shadow: 0 4px 20px rgba(255,255,255,0.2);
        }
        button {
            padding: 0 25px;
            border-radius: 30px;
            border: none;
            background: linear-gradient(135deg, #ff4e50, #f9d423);
            color: #fff;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: transform 0.2s;
        }
        button:active {
            transform: scale(0.95);
        }
        #toggle-cam-btn {
            background: linear-gradient(135deg, #00c6ff, #0072ff);
        }
        #loading-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #111;
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 24px;
            transition: opacity 0.5s ease;
        }
        .spinner {
            border: 4px solid rgba(255,255,255,0.1);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border-left-color: #ff4e50;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js" crossorigin="anonymous"></script>
</head>
<body>

    <div id="loading-screen">
        <div class="spinner"></div>
        <div id="loading-text">प्रिया को तैयार किया जा रहा है...</div>
    </div>

    <video id="video-bg" autoplay loop muted playsinline>
        <source src="https://assets.mixkit.co/videos/preview/mixkit-beautiful-waterfall-in-a-lush-green-forest-43187-large.mp4" type="video/mp4">
    </video>

    <video id="webcam-video" autoplay playsinline></video>
    <div id="canvas-container"></div>

    <div id="ui-container">
        <div id="subtitles">नमस्ते! मैं प्रिया हूँ। आप मुझसे बात कर सकते हैं... 😊</div>
        <div class="controls-row">
            <input type="text" id="user-input" placeholder="प्रिया से कुछ पूछें या कहें (e.g., 'red dress पहनें')...">
            <button id="send-btn">भेजें</button>
            <button id="toggle-cam-btn">📷 ट्रैकिंग</button>
        </div>
    </div>

    <script>
        // CONFIGURATION BLOCK
        const ELEVENLABS_API_KEY = "YOUR_ELEVENLABS_API_KEY"; 
        const VOICE_ID = "21m00Tcm4TlvDq8ikWAM"; // प्रिया (भारतीय लड़की) जैसी आवाज का ID
        const OPENWEATHER_API_KEY = "YOUR_OPENWEATHER_API_KEY"; 
        const DEFAULT_CITY = "Mumbai";

        // Memory Engine Initializer (Persistent Memory Core)
        let priyaMemory = JSON.parse(localStorage.getItem('priya_memory')) || {
            userName: "दोस्त",
            preferences: {},
            lastConversationDate: null,
            moodHistory: []
        };

        function saveMemory() {
            localStorage.setItem('priya_memory', JSON.stringify(priyaMemory));
        }

        // Global Scene Variables
        let scene, camera, renderer, model, mixer, controls;
        let allSkinnedMeshes = [];
        let clock = new THREE.Clock();
        
        // Touch/Interaction Timers & Weather Particles
        let forceTouchTimer = 0.0;
        let targetTouchY = 0;
        let weatherParticles;
        let currentOutfitColor = 0xffffff;

        // Tracking Target Structure
        let targetHeadRotation = { x: 0, y: 0 };
        let currentHeadRotation = { x: 0, y: 0 };
        let isCamTracking = false;

        // Initialize Core System
        init();
        initWeatherAndSky();
        animate();

        function init() {
            const container = document.getElementById('canvas-container');

            // Scene Creation
            scene = new THREE.Scene();

            // Camera Setup
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
            camera.position.set(0, 1.4, 2.5);

            // WebGL Renderer with Alpha Channel
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.shadowMap.enabled = true;
            renderer.outputEncoding = THREE.sRGBEncoding;
            container.appendChild(renderer.domElement);

            // Cinematic Outdoor Lighting Architecture
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
            scene.add(ambientLight);

            const sunLight = new THREE.DirectionalLight(0xfffaed, 0.8);
            sunLight.position.set(5, 10, 5);
            scene.add(sunLight);

            const waterBounceLight = new THREE.DirectionalLight(0xcce6ff, 0.5);
            waterBounceLight.position.set(-2, -5, 2);
            scene.add(waterBounceLight);

            // Orbit Controls Initialization
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.maxPolarAngle = Math.PI / 2 + 0.1;
            controls.minDistance = 1;
            controls.maxDistance = 10;
            controls.target.set(0, 1.3, 0);

            // Asynchronous 3D Model Loader Engine
            const loader = new THREE.GLTFLoader();
            // ReadyPlayerMe Model Target URL (Priya Face Structure Compatible)
            const modelUrl = 'https://models.readyplayer.me/64b533e4da90ef1aa856bfda.glb'; 

            loader.load(modelUrl, function (gltf) {
                model = gltf.scene;
                model.position.set(0, 0, 0);
                scene.add(model);

                // Ultra-Deep Blendshape & Mesh Scanner Matrix
                model.traverse((child) => {
                    if (child.isMesh) {
                        child.castShadow = true;
                        child.receiveShadow = true;
                    }
                    if (child.isSkinnedMesh) {
                        allSkinnedMeshes.push(child);
                    }
                });

                // Idle Animations Handler
                if (gltf.animations && gltf.animations.length > 0) {
                    mixer = new THREE.AnimationMixer(model);
                    const idleAction = mixer.clipAction(gltf.animations[0]);
                    idleAction.play();
                }

                // Remove Loader Screen Instantly
                document.getElementById('loading-screen').style.opacity = '0';
                setTimeout(() => { document.getElementById('loading-screen').style.display = 'none'; }, 500);

                // Check Memory greetings
                checkPersistentMemoryInit();

            }, function (xhr) {
                if (xhr.total > 0) {
                    let percent = Math.round((xhr.loaded / xhr.total) * 100);
                    document.getElementById('loading-text').innerText = `प्रिया को तैयार किया जा रहा है... ${percent}%`;
                }
            }, function (error) {
                console.error('Model Loading Failed:', error);
                document.getElementById('loading-text').innerText = "मॉडल लोड करने में त्रुटि आई। कृपया पुनः प्रयास करें।";
            });

            window.addEventListener('pointerdown', onDocumentTouchStart, false);
            window.addEventListener('resize', onWindowResize, false);
        }

        // Real-Time Dynamic Weather & Sky Engine Sync
        async function initWeatherAndSky() {
            let weatherType = "clear";
            try {
                if (OPENWEATHER_API_KEY !== "YOUR_OPENWEATHER_API_KEY") {
                    const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${DEFAULT_CITY}&appid=${OPENWEATHER_API_KEY}`);
                    const data = await res.json();
                    weatherType = data.weather[0].main.toLowerCase();
                }
            } catch (e) { console.log("Weather API skipped, running default profile."); }

            if (weatherType.includes("rain") || weatherType.includes("drizzle")) {
                const particleCount = 1000;
                const geometry = new THREE.BufferGeometry();
                const positions = new Float32Array(particleCount * 3);
                for (let i = 0; i < particleCount * 3; i += 3) {
                    positions[i] = (Math.random() - 0.5) * 10;
                    positions[i+1] = Math.random() * 5;
                    positions[i+2] = (Math.random() - 0.5) * 10;
                }
                geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
                const material = new THREE.PointsMaterial({ color: 0x90caf9, size: 0.03, transparent: true, opacity: 0.6 });
                weatherParticles = new THREE.Points(geometry, material);
                scene.add(weatherParticles);
            }
        }

        // Touch Input Analyzer Matrix
        function onDocumentTouchStart(event) {
            if (!model) return;
            
            let mouseX = (event.clientX / window.innerWidth) * 2 - 1;
            let mouseY = -(event.clientY / window.innerHeight) * 2 + 1;
            
            targetTouchY = mouseY;
            forceTouchTimer = 4.0; 
            
            if (mouseY > 0.35) {
                triggerEmotionalBlendshapes("shy");
                speakResponse("उमम... आप मुझे ऐसे छूते हैं तो मुझे बहुत शर्म आती है...!");
            } else {
                triggerEmotionalBlendshapes("happy");
                speakResponse("हाहा! यहाँ गुदगुदी होती है! बताइए आज क्या बातें करनी हैं?");
            }
        }

        // Emotional Blendshape Sync Engine
        function triggerEmotionalBlendshapes(sentiment) {
            allSkinnedMeshes.forEach(mesh => {
                if (!mesh.morphTargetDictionary) return;
                
                const targets = ["mouthSmileLeft", "mouthSmileRight", "browDownLeft", "browDownRight", "browInnerUp"];
                targets.forEach(t => {
                    let idx = mesh.morphTargetDictionary[t];
                    if (idx !== undefined) mesh.morphTargetInfluences[idx] = 0;
                });

                if (sentiment === "happy" || sentiment === "joy") {
                    let sLeft = mesh.morphTargetDictionary["mouthSmileLeft"];
                    let sRight = mesh.morphTargetDictionary["mouthSmileRight"];
                    if (sLeft !== undefined) mesh.morphTargetInfluences[sLeft] = 0.8;
                    if (sRight !== undefined) mesh.morphTargetInfluences[sRight] = 0.8;
                } else if (sentiment === "sad" || sentiment === "sorry") {
                    let bLeft = mesh.morphTargetDictionary["browDownLeft"];
                    let bRight = mesh.morphTargetDictionary["browDownRight"];
                    if (bLeft !== undefined) mesh.morphTargetInfluences[bLeft] = 0.7;
                    if (bRight !== undefined) mesh.morphTargetInfluences[bRight] = 0.7;
                } else if (sentiment === "shy") {
                    let bUp = mesh.morphTargetDictionary["browInnerUp"];
                    let sLeft = mesh.morphTargetDictionary["mouthSmileLeft"];
                    if (bUp !== undefined) mesh.morphTargetInfluences[bUp] = 0.6;
                    if (sLeft !== undefined) mesh.morphTargetInfluences[sLeft] = 0.4;
                }
            });
        }

        // Lip-Sync Generator
        function simulateLipSync(volume) {
            allSkinnedMeshes.forEach(mesh => {
                if (!mesh.morphTargetDictionary) return;
                const visemes = ["mouthOpen", "jawOpen", "viseme_aa", "viseme_O"];
                visemes.forEach(v => {
                    let idx = mesh.morphTargetDictionary[v];
                    if (idx !== undefined) {
                        mesh.morphTargetInfluences[idx] = volume;
                    }
                });
            });
        }

        // Dynamic Outfit Swapper
        function changeOutfitColor(colorHex) {
            currentOutfitColor = colorHex;
            allSkinnedMeshes.forEach(mesh => {
                if (mesh.name.toLowerCase().includes('outfit') || mesh.name.toLowerCase().includes('tops') || mesh.name.toLowerCase().includes('bottom')) {
                    if (mesh.material) {
                        if (Array.isArray(mesh.material)) {
                            mesh.material.forEach(mat => mat.color.setHex(colorHex));
                        } else {
                            mesh.material.color.setHex(colorHex);
                        }
                    }
                }
            });
        }

        // Long-Term Memory Core Implementation
        function checkPersistentMemoryInit() {
            const today = new Date().toDateString();
            if (priyaMemory.lastConversationDate) {
                if (priyaMemory.lastConversationDate !== today) {
                    setTimeout(() => {
                        speakResponse(`नमस्ते ${priyaMemory.userName}! आप कुछ दिन पहले आए थे। आज आपसे मिलकर फिर से बहुत खुशी हो रही है! आपका वह काम कैसा चल रहा है?`);
                    }, 2000);
                }
            } else {
                priyaMemory.lastConversationDate = today;
                saveMemory();
            }
        }

        // Asynchronous Text Processing & Intent Classifier
        async function processUserInput() {
            const inputField = document.getElementById('user-input');
            const text = inputField.value.trim();
            if (!text) return;

            inputField.value = "";
            document.getElementById('subtitles').innerText = "...प्रिया सोच रही है...";

            if (text.toLowerCase().includes("red dress") || text.includes("लाल कपड़े")) {
                changeOutfitColor(0xff0000);
                triggerEmotionalBlendshapes("happy");
                speakResponse("लीजिए! आपकी पसंद के अनुसार मैंने लाल रंग की ड्रेस पहन ली है। कैसी लग रही हूँ मैं?");
                return;
            }
            if (text.toLowerCase().includes("blue dress") || text.includes("नीली ड्रेस")) {
                changeOutfitColor(0x0000ff);
                triggerEmotionalBlendshapes("happy");
                speakResponse("हाँ बिल्कुल, नीला मेरा भी पसंदीदा रंग है! देखिए मेरा नया आउटफिट।");
                return;
            }
            if (text.toLowerCase().includes("नाम") && text.includes("है")) {
                const words = text.split(" ");
                let idx = words.findIndex(w => w.includes("नाम"));
                if (words[idx+2]) {
                    priyaMemory.userName = words[idx+2];
                    saveMemory();
                }
            }

            let sentiment = "happy";
            if (text.includes("उदासी") || text.includes("परेशान") || text.includes("दुखी")) sentiment = "sad";

            triggerEmotionalBlendshapes(sentiment);

            let generatedReply = `मुझे यह सुनकर बेहद खुशी हुई। आप बहुत अच्छे इंसान हैं! क्या आप मेरे कपड़ों का रंग बदलना चाहते हैं?`;
            if (sentiment === "sad") {
                generatedReply = `अरे... आप उदास मत होइए। मैं हमेशा आपके साथ हूँ। सब कुछ ठीक हो जाएगा!`;
            }

            speakResponse(generatedReply);
        }

        // Multi-tier TTS Integration
        function speakResponse(text) {
            document.getElementById('subtitles').innerText = text;

            if (ELEVENLABS_API_KEY !== "YOUR_ELEVENLABS_API_KEY" && window.WebSocket) {
                const wsUrl = `wss://api.elevenlabs.io/v1/text-to-speech/${VOICE_ID}/stream-input?model_id=eleven_monolingual_v1`;
                const socket = new WebSocket(wsUrl);

                socket.onopen = () => {
                    const bosMessage = { "text": " ", "voice_settings": { "stability": 0.5, "similarity_boost": 0.8 }, "xi_api_key": ELEVENLABS_API_KEY };
                    socket.send(JSON.stringify(bosMessage));
                    const textMessage = { "text": text, "try_trigger_generation": true };
                    socket.send(JSON.stringify(textMessage));
                };

                socket.onmessage = (event) => {
                    const response = JSON.parse(event.data);
                    if (response.audio) {
                        const audioBytes = atob(response.audio);
                        executeNativeLipSyncBackup(text); 
                    }
                };
                
                socket.onerror = () => { executeNativeLipSyncBackup(text); };
            } else {
                executeNativeLipSyncBackup(text);
            }
        }

        function executeNativeLipSyncBackup(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'hi-IN';
                
                let syncInterval = setInterval(() => {
                    if (window.speechSynthesis.speaking) {
                        simulateLipSync(0.3 + Math.sin(Date.now() * 0.05) * 0.4);
                    } else {
                        simulateLipSync(0);
                        clearInterval(syncInterval);
                    }
                }, 50);

                window.speechSynthesis.speak(utterance);
            }
        }

        // MediaPipe Face Mesh Pipeline Setup
        function initWebcamTracking() {
            const videoElement = document.getElementById('webcam-video');
            videoElement.style.display = 'block';

            const faceMesh = new FaceMesh({
                locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`
            });

            faceMesh.setOptions({
                maxNumFaces: 1,
                refineLandmarks: true,
                minDetectionConfidence: 0.5,
                minTrackingConfidence: 0.5
            });

            faceMesh.onResults((results) => {
                if (!results.multiFaceLandmarks || results.multiFaceLandmarks.length === 0) return;
                
                const landmarks = results.multiFaceLandmarks[0];
                const nose = landmarks[4];
                
                targetHeadRotation.y = -(nose.x - 0.5) * 1.2; 
                targetHeadRotation.x = (nose.y - 0.5) * 0.8;
            });

            const cameraUtils = new Camera(videoElement, {
                onFrame: async () => { if (isCamTracking) await faceMesh.send({ image: videoElement }); },
                width: 320,
                height: 240
            });
            cameraUtils.start();
        }

        // Main Loop
        function animate() {
            requestAnimationFrame(animate);
            let delta = clock.getDelta();
            let t = clock.getElapsedTime();

            if (mixer) mixer.update(delta);

            let blinkScale = Math.sin(t * 3.0);
            allSkinnedMeshes.forEach(mesh => {
                if (mesh.morphTargetDictionary) {
                    let bLeft = mesh.morphTargetDictionary["eyeBlinkLeft"];
                    let bRight = mesh.morphTargetDictionary["eyeBlinkRight"];
                    if (bLeft !== undefined && bRight !== undefined) {
                        mesh.morphTargetInfluences[bLeft] = blinkScale > 0.96 ? (blinkScale - 0.96) * 25 : 0;
                        mesh.morphTargetInfluences[bRight] = blinkScale > 0.96 ? (blinkScale - 0.96) * 25 : 0;
                    }
                }
            });

            if (model) {
                let headBone = model.getObjectByName("Head") || model.getObjectByName("Neck");
                if (headBone) {
                    if (isCamTracking) {
                        currentHeadRotation.x += (targetHeadRotation.x - currentHeadRotation.x) * 0.1;
                        currentHeadRotation.y += (targetHeadRotation.y - currentHeadRotation.y) * 0.1;
                        headBone.rotation.x = currentHeadRotation.x;
                        headBone.rotation.y = currentHeadRotation.y;
                    } else if (forceTouchTimer > 0) {
                        headBone.rotation.y = Math.sin(t * 2) * 0.15;
                        forceTouchTimer -= delta;
                    } else {
                        headBone.rotation.set(0, 0, 0);
                    }
                }
            }

            if (weatherParticles) {
                const positions = weatherParticles.geometry.attributes.position.array;
                for (let i = 1; i < positions.length; i += 3) {
                    positions[i] -= delta * 3.5; 
                    if (positions[i] < 0) positions[i] = 5; 
                }
                weatherParticles.geometry.attributes.position.needsUpdate = true;
            }

            if (controls) controls.update();
            renderer.render(scene, camera);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        document.getElementById('send-btn').addEventListener('click', processUserInput);
        document.getElementById('user-input').addEventListener('keypress', (e) => { if (e.key === 'Enter') processUserInput(); });
        
        document.getElementById('toggle-cam-btn').addEventListener('click', () => {
            isCamTracking = !isCamTracking;
            if (isCamTracking) {
                document.getElementById('toggle-cam-btn').style.background = "linear-gradient(135deg, #11998e, #38ef7d)";
                initWebcamTracking();
            } else {
                document.getElementById('toggle-cam-btn').style.background = "linear-gradient(135deg, #00c6ff, #0072ff)";
                document.getElementById('webcam-video').style.display = 'none';
            }
        });
    </script>
</body>
</html>
