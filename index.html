<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>प्रिया AI - Final Production v7.7.1</title>
    <style>
        :root { --neon-cyan: #00ffcc; --neon-pink: #ff007f; --bg-glass: rgba(10, 10, 22, 0.7); }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #020206; font-family: 'Segoe UI', sans-serif; }
        #canvas-container { width: 100%; height: 100%; position: absolute; z-index: 3; touch-action: none; }
        .dashboard { position: absolute; top: 20px; left: 20px; z-index: 10; background: var(--bg-glass); padding: 15px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px); color: white; }
        .ui-dock { position: absolute; bottom: 30px; width: 100%; display: flex; justify-content: center; gap: 15px; z-index: 20; }
        .input-box { background: rgba(255,255,255,0.1); border-radius: 30px; padding: 10px 20px; width: 300px; border: none; color: white; outline: none; }
        .btn { border-radius: 50%; width: 50px; height: 50px; border: none; cursor: pointer; }
        #subtitle { position: absolute; bottom: 120px; left: 50%; transform: translateX(-50%); color: white; background: rgba(0,0,0,0.6); padding: 10px 20px; border-radius: 10px; display: none; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
</head>
<body>

    <div class="dashboard">
        <div id="system-core-mood-txt">प्रिया कोर v7.7.1</div>
    </div>
    <div id="subtitle"></div>
    <div id="canvas-container"></div>
    <div class="ui-dock">
        <button class="btn" id="micBtn">🎤</button>
        <input type="text" class="input-box" id="userInput" placeholder="कमांड दें...">
        <button class="btn" id="sendBtn">➔</button>
    </div>

    <script>
        // CORE INITIALIZATION
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 100);
        const renderer = new THREE.WebGLRenderer({antialias: true, alpha: true});
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);
        
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        camera.position.set(0, 0, 1.5);
        controls.enablePan = false; controls.minDistance = 1.0; controls.maxDistance = 3.0;

        // LIGHTING
        scene.add(new THREE.AmbientLight(0xffffff, 1.5));
        
        // GLOBAL VARIABLES
        let model, mixer, bones = {};
        let state = 'idle', stateTime = 0;

        // LOADER
        const loader = new THREE.GLTFLoader();
        loader.load("https://cdn.jsdelivr.net/gh/jessearmy572-hub/naman3@main/model.glb", (gltf) => {
            model = gltf.scene;
            scene.add(model);
            model.traverse(n => { if(n.isBone) bones[n.name] = n; });
        });

        // COMMAND ENGINE
        function executeCommand(text) {
            text = text.toLowerCase();
            if(text.includes('नमस्ते')) { state = 'greet'; speak("नमस्ते!"); }
            else if(text.includes('डांस')) { state = 'dance'; speak("देखिए मेरे मूवमेंट्स!"); }
            else if(text.includes('गुस्सा')) { state = 'angry'; speak("मुझे गुस्सा मत दिलाइए!"); }
            else { state = 'idle'; }
            stateTime = performance.now();
        }

        // SPEECH ENGINE
        function speak(text) {
            const sub = document.getElementById('subtitle');
            sub.innerText = text; sub.style.display = 'block';
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'hi-IN';
            msg.onend = () => sub.style.display = 'none';
            window.speechSynthesis.speak(msg);
        }

        // ANIMATION LOOP
        function animate() {
            requestAnimationFrame(animate);
            if(model) {
                // Smooth Bone Interpolation for States
                if(state === 'dance') {
                    const wave = Math.sin(Date.now() * 0.005);
                    if(bones['Spine']) bones['Spine'].rotation.y = wave * 0.2;
                }
                // Reset to Idle
                if(state !== 'idle' && (performance.now() - stateTime > 5000)) state = 'idle';
            }
            renderer.render(scene, camera);
        }

        // LISTENERS
        document.getElementById('sendBtn').onclick = () => executeCommand(document.getElementById('userInput').value);
        
        animate();
    </script>
</body>
</html>
