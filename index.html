<script>
    // 1. Speech Recognition Fix
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const recognition = SpeechRecognition ? new SpeechRecognition() : null;

    if (recognition) {
        recognition.lang = 'hi-IN';
        recognition.continuous = false;

        recognition.onstart = () => {
            document.getElementById('micBtn').classList.add('listening');
            console.log("Mic listening...");
        };

        recognition.onresult = (event) => {
            const transcript = event.results[0][0].transcript;
            document.getElementById('userInput').value = transcript;
            parseAndRouteAICommands(transcript); // Command process karein
        };

        recognition.onend = () => {
            document.getElementById('micBtn').classList.remove('listening');
        };
    }

    // 2. Click Handler (Interaction Fix)
    document.getElementById('micBtn').addEventListener('click', () => {
        if (recognition) {
            try { recognition.start(); } 
            catch(e) { console.log("Mic already active or blocked."); }
        } else {
            alert("Speech Recognition not supported in this browser.");
        }
    });

    // 3. Morph Target Fix (Blinking)
    // model-viewer mein morph targets ke liye hum 'model-value' direct access karte hain
    const modelViewer = document.getElementById('myModel');
    
    // Blink function (Error free version)
    function triggerBlink() {
        // Direct access via model-viewer's internal access
        const blink = modelViewer.queryModelInfo().morphTargets.find(m => m.name === 'eyeBlinkLeft');
        // Agar manual animation chahiye to model.animationName = "Blink" use karna best hai
    }
</script>
