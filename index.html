<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>प्रिया AI - Avaturn आर्किटेक्चर इंजन v2.7</title>
    <style>
        :root {
            --neon-cyan: #00ffcc;
            --neon-blue: #0077ff;
            --neon-orange: #ff5500;
            --neon-pink: #ff007f;
            --text-core-white: #ffffff;
            --text-dim-slate: #8a99ad;
            --bg-glass-panel: rgba(10, 10, 25, 0.75);
            --border-matte-white: rgba(255, 255, 255, 0.12);
            --bg-input-field: rgba(5, 5, 15, 0.85);
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #020208;
            font-family: 'Segoe UI', Roboto, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        .matrix-grid-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2;
            background-image: 
                linear-gradient(rgba(0, 255, 204, 0.008) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 204, 0.008) 1px, transparent 1px);
            background-size: 50px 50px; pointer-events: none; opacity: 0.8;
        }

        #canvas-container {
            width: 100%; height: 100%; position: absolute; top: 0; left: 0;
            z-index: 3; cursor: grab; display: block; touch-action: none;
        }
        #canvas-container:active { cursor: grabbing; }

        .dashboard {
            position: absolute; top: 20px; left: 20px; z-index: 10;
            background: var(--bg-glass-panel); padding: 14px 20px; border-radius: 16px;
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-matte-white);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .status-block { display: flex; align-items: center; margin-bottom: 6px; }
        .status-beacon-dot {
            width: 10px; height: 10px; background: var(--neon-cyan);
            border-radius: 50%; margin-right: 10px;
            box-shadow: 0 0 10px var(--neon-cyan);
        }
        .status-title { font-size: 13px; font-weight: 700; text-transform: uppercase; color: var(--text-core-white); letter-spacing: 1px; }
        .channel-info { font-size: 11px; color: var(--text-dim-slate); }
        .badge { font-size: 11px; margin-top: 4px; font-weight: bold; }

        .ui-dock-wrapper {
            position: absolute; bottom: 30px; width: 100%; display: flex;
            justify-content: center; align-items: center; gap: 12px; z-index: 20;
            padding: 0 20px; box-sizing: border-box;
        }

        .input-carrier-box {
            background: var(--bg-input-field); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            padding: 0 20px; border-radius: 30px; flex-grow: 1; max-width: 600px; height: 56px;
            display: flex; align-items: center; border: 1px solid rgba(255, 255, 255, 0.12);
        }
        .input-carrier-box:focus-within { border-color: var(--neon-cyan); }

        input {
            width: 100%; background: transparent; border: none; color: var(--text-core-white);
            outline: none; font-size: 15px; height: 100%;
        }
        input::placeholder { color: rgba(255, 255, 255, 0.35); }

        .action-circle-btn {
            border: none; border-radius: 50%; width: 56px; height: 56px; cursor: pointer;
            display: flex; align-items: center; justify-content: center; font-size: 20px;
        }
        .mic-trigger-btn { background: linear-gradient(135deg, var(--neon-orange), var(--neon-pink)); color: white; }
        .mic-trigger-btn.listening { background: var(--neon-cyan); animation: pulse 1s infinite alternate; }
        .send-trigger-btn { background: white; color: black; }

        #subtitle-monitor-box {
            position: absolute; bottom: 105px; left: 50%; transform: translateX(-50%);
            background: rgba(5, 5, 18, 0.95); padding: 12px 24px; border-radius: 16px;
            color: white; font-size: 15px; max-width: 80%; text-align: center; z-index: 30;
            border: 1px solid rgba(255,255,255,0.12); display: none;
        }

        #core-boot-loader {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #04040c; z-index: 99999; display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        .loader-ring-spinner {
            width: 50px; height: 50px; border: 3px solid rgba(0, 255, 204, 0.1);
            border-radius: 50%; border-top-color: var(--neon-cyan); animation: spin 1s linear infinite; margin-bottom: 20px;
        }
        .loader-label-text { color: var(--neon-cyan); font-size: 14px; text-transform: uppercase; letter-spacing: 1px; text-align: center; }

        #webcam-raw-stream { display: none; }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes pulse { 0% { transform: scale(1); } 100% { transform: scale(1.08); } }
    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-core"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-converter"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-webgl"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/face-landmarks-detection"></script>
</head>
<body>

    <div class="matrix-grid-overlay"></div>
    <video id="webcam-raw-stream" autoplay playsinline muted></video>

    <div class="dashboard">
        <div class="status-block">
            <span class="status-beacon-dot"></span> 
            <span class="status-title" id="system-core-mood-txt">प्रिया कोर v2.7: एक्टिव</span>
        </div>
        <div class="channel-info">आर्किटेक्चर मोड: <span style="color:#00ffcc; font-weight:bold;">Avaturn 3D Config</span></div>
        <div class="badge" id="drive-sync-status" style="color: #00ffcc;">✅ ARKit ब्लेंडशेप्स: लोड हो गए</div>
        <div class="badge" id="face-tracker-badge" style="color: #ffaa00;">📷 विज़न ट्रैकर ग्रिड: रेडी</div>
    </div>

    <div id="core-boot-loader">
        <div class="loader-ring-spinner"></div>
        <div class="loader-label-text">प्रिया का Avaturn माइंड मैप हो रहा है...<br><span style="font-size:11px; color:#666;">कनेक्टिंग: Head, Neck, LeftEye, RightEye, jawOpen</span></div>
    </div>

    <div id="canvas-container"></div>
    <div id="subtitle-monitor-box">प्रिया सुन रही है...</div>

    <div class="ui-dock-wrapper">
        <button class="action-circle-btn mic-trigger-btn" id="micBtn">🎤</button>
        <div class="input-carrier-box">
            <input type="text" id="userInput" placeholder="प्रिया से बात करें..." autocomplete="off"/>
        </div>
        <button class="action-circle-btn send-trigger-btn" id="sendBtn">➔</button>
    </div>

    <script>
        const APPS_SCRIPT_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyI_Vz0rR7O_CclY-vH-XUorR_2oBsh236U_v7a2g5_nre382_j0Xy28rYhY24vG_E/exec";
        const ALTERNATE_ASSET_URI = "https://cdn.jsdelivr.net/gh/jessearmy572-hub/naman3@main/model.glb";

        let coreThreeSceneInstance, corePerspectiveCameraNode, coreWebGLRendererModule, coreOrbitControlsRig, coreAnimationMixerController, coreSystemClockReference;
        let structuralAvatar3DModelRoot = null;
        
        // 🎯 Avaturn-Specific Bones Mapping
        let avaturnBoneHead = null;
        let avaturnBoneNeck = null;
        let avaturnBoneSpine = null;
        let avaturnBoneLeftEye = null;
        let avaturnBoneRightEye = null;
        
        // 🎯 Avaturn Apple ARKit Standard Blendshape Targets
        let avaturnSkinnedMeshes = [];

        // ट्रैकिंग कोऑर्डिनेट्स
        let pointerTargetX = 0, pointerTargetY = 0;
        let smoothTrackX = 0, smoothTrackY = 0;
        let isWebcamHardwareActive = false, dynamicAIComputedFaceDetector = null;

        // ऑडियो एनालाइज़र (लिपसिंक के लिए)
        let hardwareAudioContextDriver = null, hardwareAudioFrequencyAnalyserNode = null, hardwareAudioFrequencyBufferArray = null;
        let liveVocalOutputStateSignalActive = false, liveSpeechCapturingStateSignalActive = false;

        const BrowserSpeechRecognitionEngineInterface = window.SpeechRecognition || window.webkitSpeechRecognition;
        let frameworkSpeechRecognitionProcessor = BrowserSpeechRecognitionEngineInterface ? new BrowserSpeechRecognitionEngineInterface() : null;

        if (frameworkSpeechRecognitionProcessor) {
            frameworkSpeechRecognitionProcessor.continuous = false;
            frameworkSpeechRecognitionProcessor.lang = 'hi-IN';
        }

        function initializeDeviceHarmonizedGraphicsPipeline() {
            const container = document.getElementById('canvas-container');
            coreSystemClockReference = new THREE.Clock();
            coreThreeSceneInstance = new THREE.Scene();
            coreThreeSceneInstance.fog = new THREE.FogExp2(0x030307, 0.02);

            coreWebGLRendererModule = new THREE.WebGLRenderer({ antialias: true, alpha: true, powerPreference: "high-performance" });
            coreWebGLRendererModule.setSize(window.innerWidth, window.innerHeight);
            coreWebGLRendererModule.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            coreWebGLRendererModule.toneMapping = THREE.ACESFilmicToneMapping;
            coreWebGLRendererModule.toneMappingExposure = 1.3;
            container.appendChild(coreWebGLRendererModule.domElement);

            corePerspectiveCameraNode = new THREE.PerspectiveCamera(38, window.innerWidth / window.innerHeight, 0.1, 100);
            corePerspectiveCameraNode.position.set(0, 0.15, 1.6); // चेहरा पास और फोकस में रखने के लिए

            // रीयल-टाइम टच / ड्रैग रिस्पॉन्स को एनेबल करने के लिए OrbitControls कॉन्फ़िगरेशन
            coreOrbitControlsRig = new THREE.OrbitControls(corePerspectiveCameraNode, coreWebGLRendererModule.domElement);
            coreOrbitControlsRig.enableZoom = true;
            coreOrbitControlsRig.enablePan = false;
            coreOrbitControlsRig.minDistance = 0.6;
            coreOrbitControlsRig.maxDistance = 2.5;
            coreOrbitControlsRig.target.set(0, 0.18, 0); // सीधे चेहरे की ऊँचाई पर फोकस
            coreOrbitControlsRig.enableDamping = true;
            coreOrbitControlsRig.dampingFactor = 0.05;

            // लाइटिंग एनवायरनमेंट
            const ambientLight = new THREE.HemisphereLight(0xffffff, 0x111122, 2.6);
            coreThreeSceneInstance.add(ambientLight);
            const directSunLight = new THREE.DirectionalLight(0xffffff, 1.6);
            directSunLight.position.set(2, 4, 3);
            coreThreeSceneInstance.add(directSunLight);

            // Avaturn मॉडल को लोड करना
            const assetLoader = new THREE.GLTFLoader();
            assetLoader.load(ALTERNATE_ASSET_URI, 
                (gltf) => { handleSuccessfulModelInjection(gltf); },
                undefined,
                (err) => { console.error("मॉडल लोड एरर:", err); }
            );

            // रीयल-टाइम माउस और टच रिस्पॉन्स बाइंडिंग्स
            window.addEventListener('mousemove', handleInteractionMove, false);
            window.addEventListener('touchmove', (e) => { if(e.touches.length > 0) handleInteractionMove(e.touches[0]); }, {passive: true});
            window.addEventListener('resize', onDisplayGridResizeLayoutCorrectionTrigger, false);

            activateSecureWebcamBiometricGrid();
        }

        function handleInteractionMove(inputData) {
            pointerTargetX = (inputData.clientX / window.innerWidth) * 2 - 1;
            pointerTargetY = -(inputData.clientY / window.innerHeight) * 2 + 1;
        }

        function handleSuccessfulModelInjection(gltfPayload) {
            structuralAvatar3DModelRoot = gltfPayload.scene;
            coreThreeSceneInstance.add(structuralAvatar3DModelRoot);
            
            // Avaturn मॉडल के लिए एकदम परफेक्ट मोबाइल/डेस्कटॉप स्केल अलाइनमेंट
            const isMobile = window.innerWidth < 768;
            structuralAvatar3DModelRoot.scale.setScalar(isMobile ? 1.05 : 1.35);
            structuralAvatar3DModelRoot.position.y = isMobile ? -0.58 : -0.78;
            structuralAvatar3DModelRoot.position.z = 0;

            document.getElementById('core-boot-loader').style.display = 'none';

            coreAnimationMixerController = new THREE.AnimationMixer(structuralAvatar3DModelRoot);
            if (gltfPayload.animations && gltfPayload.animations.length > 0) {
                coreAnimationMixerController.clipAction(gltfPayload.animations[0]).play();
            }

            // 🎯 AVATURN PERFECT ANATOMY MAPPING (हड्डियों और ब्लेंडशेप्स के सटीक नाम)
            structuralAvatar3DModelRoot.traverse((node) => {
                // 1. हड्डियों की मैपिंग (Avaturn Standard Framework)
                if (node.isBone) {
                    if (node.name === 'Head') avaturnBoneHead = node;
                    if (node.name === 'Neck') avaturnBoneNeck = node;
                    if (node.name === 'Spine') avaturnBoneSpine = node;
                    if (node.name === 'LeftEye') avaturnBoneLeftEye = node;
                    if (node.name === 'RightEye') avaturnBoneRightEye = node;
                }

                // 2. फिक्स्ड ARKit ब्लेंडशेप्स मैपिंग वाले मेश कलेक्ट करना
                if (node.isMesh && node.morphTargetDictionary) {
                    avaturnSkinnedMeshes.push(node);
                }
            });

            document.getElementById('drive-sync-status').innerText = "✅ Avaturn आर्किटेक्चर: 100% एक्टिव";
        }

        // कैमरा ट्रैकर सेटअप
        async function activateSecureWebcamBiometricGrid() {
            const streamVideoElement = document.getElementById('webcam-raw-stream');
            try {
                const hardwareCaptureMediaStream = await navigator.mediaDevices.getUserMedia({ video: { width: 320, height: 240 } });
                streamVideoElement.srcObject = hardwareCaptureMediaStream;
                dynamicAIComputedFaceDetector = await faceLandmarksDetection.createDetector(
                    faceLandmarksDetection.SupportedModels.MediaPipeFaceMesh, 
                    { runtime: 'tfjs', maxFaces: 1 }
                );
                isWebcamHardwareActive = true;
                document.getElementById('face-tracker-badge').innerText = "📷 विज़न: रीयल-टाइम ट्रैकिंग चालू है";
                processLiveCameraFramesMatrix();
            } catch (err) {
                document.getElementById('face-tracker-badge').innerText = "鼠标 Mode: माउस और टच ट्रैकिंग सक्रिय";
            }
        }

        async function processLiveCameraFramesMatrix() {
            const streamVideoElement = document.getElementById('webcam-raw-stream');
            if (!isWebcamHardwareActive || !dynamicAIComputedFaceDetector) return;
            try {
                if (streamVideoElement.readyState >= 2) {
                    const detectedFacesArray = await dynamicAIComputedFaceDetector.estimateFaces(streamVideoElement);
                    if (detectedFacesArray && detectedFacesArray.length > 0) {
                        const kp = detectedFacesArray[0].keypoints;
                        const nose = kp.find(p => p.name === 'noseTip') || kp[4];
                        if (nose) {
                            pointerTargetX = -((nose.x / 320) * 2 - 1) * 1.4;
                            pointerTargetY = -((nose.y / 240) * 2 - 1) * 1.0;
                        }
                    }
                }
            } catch (e) {}
            requestAnimationFrame(processLiveCameraFramesMatrix);
        }

        function forceAudioCaptureDeviceNodeGraphCalibration() {
            if (hardwareAudioContextDriver) return;
            try {
                hardwareAudioContextDriver = new (window.AudioContext || window.webkitAudioContext)();
                hardwareAudioFrequencyAnalyserNode = hardwareAudioContextDriver.createAnalyser();
                hardwareAudioFrequencyAnalyserNode.fftSize = 64;
                hardwareAudioFrequencyBufferArray = new Uint8Array(hardwareAudioFrequencyAnalyserNode.frequencyBinCount);
            } catch(e) {}
        }

        function dispatchSpeechSynthesizerVocalTrackBuffer(text) {
            if (!window.speechSynthesis) return;
            forceAudioCaptureDeviceNodeGraphCalibration();

            if (hardwareAudioContextDriver && hardwareAudioContextDriver.state === 'suspended') {
                hardwareAudioContextDriver.resume();
            }
            window.speechSynthesis.cancel();

            let strippedText = text.replace(/\[.*?\]/g, '').trim();
            const subtitleBox = document.getElementById('subtitle-monitor-box');
            subtitleBox.innerText = text;
            subtitleBox.style.display = 'block';

            let utterance = new SpeechSynthesisUtterance(strippedText);
            utterance.lang = 'hi-IN';
            utterance.rate = 1.02;

            utterance.onstart = () => { liveVocalOutputStateSignalActive = true; };
            utterance.onend = () => { liveVocalOutputStateSignalActive = false; subtitleBox.style.display = 'none'; };
            utterance.onerror = () => { liveVocalOutputStateSignalActive = false; };

            window.speechSynthesis.speak(utterance);
        }

        async function triggerInteractionLifecycleExecutionCycle() {
            const inputElement = document.getElementById('userInput');
            const userString = inputElement.value.trim();
            if (!userString) return;

            inputElement.value = "";
            document.getElementById('system-core-mood-txt').innerText = "प्रिया कोर: प्रोसेसिंग... 🧠";

            try {
                const response = await fetch(APPS_SCRIPT_WEB_APP_URL, { method: "POST", body: JSON.stringify({ query: userString }) });
                const data = await response.json();
                document.getElementById('system-core-mood-txt').innerText = "प्रिया कोर: एक्टिव ⚡";
                dispatchSpeechSynthesizerVocalTrackBuffer(data.text || data.output);
            } catch (error) {
                document.getElementById('system-core-mood-txt').innerText = "प्रिया कोर: लोकल मोड ⚡";
                dispatchSpeechSynthesizerVocalTrackBuffer("[मुस्कुराते हुए] मैं आपकी बात सुन रही हूँ, बताइए क्या काम है?");
            }
        }

        // 🔄 MAIN ENGINE RENDER LOOP (रीयल-टाइम सिंकिंग)
        function masterApplicationRenderLoopExecutionCycle() {
            requestAnimationFrame(masterApplicationRenderLoopExecutionCycle);

            const delta = coreSystemClockReference.getDelta();
            const elapsed = coreSystemClockReference.getElapsedTime();

            if (coreAnimationMixerController) coreAnimationMixerController.update(delta);
            if (coreOrbitControlsRig) coreOrbitControlsRig.update();

            if (structuralAvatar3DModelRoot) {
                // 1. रिस्पॉन्सिव कोऑर्डिनेट्स को स्मूथ करना (Lerp)
                smoothTrackX = THREE.MathUtils.lerp(smoothTrackX, pointerTargetX, 0.1);
                smoothTrackY = THREE.MathUtils.lerp(smoothTrackY, pointerTargetY, 0.1);

                // 2. Avaturn Bones का रीयल-टाइम मूवमेंट (सिर, गर्दन और आँखें)
                if (avaturnBoneHead) {
                    avaturnBoneHead.rotation.y = smoothTrackX * 0.45; // गर्दन का लेफ्ट-राइट घूमना
                    avaturnBoneHead.rotation.x = -smoothTrackY * 0.25 + (Math.sin(elapsed * 1.8) * 0.015); // अप-डाउन + ब्रीदिंग इफेक्ट
                }
                if (avaturnBoneNeck) {
                    avaturnBoneNeck.rotation.y = smoothTrackX * 0.15;
                }
                if (avaturnBoneLeftEye && avaturnBoneRightEye) {
                    avaturnBoneLeftEye.rotation.y = smoothTrackX * 0.25; // आँखें स्क्रीन पर आपको ट्रैक करेंगी
                    avaturnBoneRightEye.rotation.y = smoothTrackX * 0.25;
                    avaturnBoneLeftEye.rotation.x = -smoothTrackY * 0.2;
                    avaturnBoneRightEye.rotation.x = -smoothTrackY * 0.2;
                }

                // 3. आवाज के हिसाब से परफेक्ट लिप-सिंक (Avaturn jawOpen Amplitude)
                let jawOpenValue = 0.0;
                if (liveVocalOutputStateSignalActive && hardwareAudioFrequencyAnalyserNode) {
                    hardwareAudioFrequencyAnalyserNode.getByteFrequencyData(hardwareAudioFrequencyBufferArray);
                    let sum = 0;
                    for (let i = 0; i < hardwareAudioFrequencyBufferArray.length; i++) sum += hardwareAudioFrequencyBufferArray[i];
                    
                    let rawNorm = sum / hardwareAudioFrequencyBufferArray.length / 255.0;
                    jawOpenValue = Math.min(rawNorm * 4.8, 1.0); // आवाज की पिच के अनुसार मुंह खुलेगा
                }

                // 4. नेचुरल आई-ब्लिंक (पलक झपकना)
                let blinkValue = (Math.sin(elapsed * 4) > 0.96) ? 1.0 : 0.0;

                // 5. Avaturn ARKit मेश के ऊपर सीधे एक्सप्रेशन्स डालना
                avaturnSkinnedMeshes.forEach(mesh => {
                    const dict = mesh.morphTargetDictionary;
                    const influences = mesh.morphTargetInfluences;
                    if (!dict || !influences) return;

                    // लिपसिंक - जब जब प्रिया बोलेगी तब 'jawOpen' काम करेगा
                    if (dict['jawOpen'] !== undefined) {
                        influences[dict['jawOpen']] = jawOpenValue;
                    }

                    // पलकें झपकना (Blinking)
                    if (dict['eyeBlinkLeft'] !== undefined) influences[dict['eyeBlinkLeft']] = blinkValue;
                    if (dict['eyeBlinkRight'] !== undefined) influences[dict['eyeBlinkRight']] = blinkValue;
                    
                    // चेहरे पर प्यारी सी नेचुरल स्माइल
                    if (dict['mouthSmileLeft'] !== undefined) influences[dict['mouthSmileLeft']] = 0.25;
                    if (dict['mouthSmileRight'] !== undefined) influences[dict['mouthSmileRight']] = 0.25;
                });
            }

            coreWebGLRendererModule.render(coreThreeSceneInstance, corePerspectiveCameraNode);
        }

        // इवेंट्स अटैचमेंट
        document.getElementById('sendBtn').addEventListener('click', triggerInteractionLifecycleExecutionCycle);
        document.getElementById('userInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') triggerInteractionLifecycleExecutionCycle(); });

        if (frameworkSpeechRecognitionProcessor) {
            frameworkSpeechRecognitionProcessor.onresult = (e) => {
                document.getElementById('userInput').value = e.results[0][0].transcript;
                triggerInteractionLifecycleExecutionCycle();
            };
            frameworkSpeechRecognitionProcessor.onstart = () => { liveSpeechCapturingStateSignalActive = true; document.getElementById('micBtn').classList.add('listening'); };
            frameworkSpeechRecognitionProcessor.onend = () => { liveSpeechCapturingStateSignalActive = false; document.getElementById('micBtn').classList.remove('listening'); };
            document.getElementById('micBtn').addEventListener('click', () => { 
                if (window.speechSynthesis) window.speechSynthesis.cancel();
                try { frameworkSpeechRecognitionProcessor.start(); } catch(e) {}
            });
        }

        // लोड स्क्रिप्ट्स निष्पादन
        initializeDeviceHarmonizedGraphicsPipeline();
        masterApplicationRenderLoopExecutionCycle();

        function onDisplayGridResizeLayoutCorrectionTrigger() {
            corePerspectiveCameraNode.aspect = window.innerWidth / window.innerHeight;
            corePerspectiveCameraNode.updateProjectionMatrix();
            coreWebGLRendererModule.setSize(window.innerWidth, window.innerHeight);
        }
    </script>
</body>
</html>
